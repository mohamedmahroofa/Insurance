<section>
  <div class="container-fluid w-100 p-0 d-none d-lg-block">
    <div class="row">
      <div class="col-12 col-lg-12 w-100">
        <div id="carouselCaptions" class="carousel slide" data-ride="carousel">
          <ol class="carousel-indicators">
            <li
              data-target="#carouselCaptions"
              data-slide-to="0"
              class="active"
            ></li>
            <li data-target="#carouselCaptions" data-slide-to="1"></li>
            <li data-target="#carouselCaptions" data-slide-to="2"></li>
          </ol>
          <div class="carousel-inner">
            <div class="carousel-item active image-overlay">
              <img
                fill
                ngSrc="assets/img/carousel-1.jpg"
                class="d-block img-fluid w-100"
                alt="Carouse Image 1"
                priority
              />
              <div class="overlay"></div>
              <div
                class="carousel-caption d-none d-md-block d-flex flex-column align-items-start justify-content-start"
              >
                <h5>Live your dream</h5>
                <p>Insurance:</p>
                <p>for your life time protection</p>
                <button class="getquote btn btn-success">Get Quote</button>
                <button class="getagent btn">Get Agent</button>
              </div>
            </div>
            <div class="carousel-item">
              <img
                fill
                ngSrc="assets/img/carousel-2.jpg"
                class="d-block img-fluid w-100"
                alt="Carousel Image 2"
                priority
              />
              <div class="overlay"></div>
              <div class="carousel-caption d-none d-md-block">
                <h5>Second slide label</h5>
                <p>
                  Some representative placeholder content for the second slide.
                </p>
              </div>
            </div>
            <div class="carousel-item">
              <img
                fill
                ngSrc="assets/img/carousel-1.jpg"
                class="d-block img-fluid w-100"
                alt="Carousel Image 1"
                priority
              />
              <div class="overlay"></div>
              <div class="carousel-caption d-none d-md-block">
                <h5>Third slide label</h5>
                <p>
                  Some representative placeholder content for the third slide.
                </p>
              </div>
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-target="#carouselCaptions"
            data-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-target="#carouselCaptions"
            data-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
